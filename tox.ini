[tox]
envlist = py310, py311, py312, py313, py314, lint
isolated_build = True

[testenv:lint]
description = Run code formatting checks
deps = black>=25.0
commands = black --check --diff waterfurnace tests

[testenv]
description = Run tests with pytest
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest>=7.0
    pytest-cov>=4.0
commands =
    pytest --cov=waterfurnace --cov-report=term-missing --cov-report=html {posargs}

[testenv:build]
description = Build package for distribution
skip_install = True
deps =
    build>=0.10.0
    twine>=4.0.0
commands =
    python -m build
    twine check dist/*
